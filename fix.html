<script>
    function updateClock() {
        const now = new Date();

        // تنسيق التاريخ (مثال: الأحد، 29 مارس 2026)
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateString = now.toLocaleDateString('ar-EG', dateOptions);

        // تنسيق الوقت (مثال: 05:22:30 م)
        const timeString = now.toLocaleTimeString('ar-EG');

        // وضع البيانات في العناصر
        document.getElementById('date').textContent = dateString;
        document.getElementById('time').textContent = timeString;
    }

    // تحديث الساعة كل ثانية (1000 ميلي ثانية)
    setInterval(updateClock, 1000);

    // تشغيل الدالة فوراً عند تحميل الصفحة
    updateClock();
</script>
